name: RISC-V

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: riscv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  riscv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-misc

      - name: Cache cargo-bloat binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-bloat
          key: ${{ runner.os }}-cargo-bloat-v1

      - name: Install cargo-bloat
        run: |
          if ! command -v cargo-bloat &> /dev/null; then
            cargo install cargo-bloat --locked
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            krabipqc_riscv32/target
          key: riscv-${{ hashFiles('krabipqc_riscv32/Cargo.toml', 'krabipqc/Cargo.toml') }}
          restore-keys: riscv-

      - name: Run RISC-V suite
        run: |
          set -o pipefail
          python3 run_suite.py | tee -a "$GITHUB_STEP_SUMMARY"
        working-directory: krabipqc_riscv32
