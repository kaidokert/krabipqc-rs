name: Cortex-M

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: cortex-m-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cortex-m:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-arm

      - name: Cache cargo-bloat binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-bloat
          key: ${{ runner.os }}-cargo-bloat-v1

      - name: Install cargo-bloat
        run: |
          if ! command -v cargo-bloat &> /dev/null; then
            cargo install cargo-bloat --locked
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            krabipqc_cortex_m3/target
          key: cortex-m-${{ hashFiles('krabipqc_cortex_m3/Cargo.toml', 'krabipqc/Cargo.toml') }}
          restore-keys: cortex-m-

      - name: Run Cortex-M suite
        run: |
          set -o pipefail
          python3 run_suite.py | tee -a "$GITHUB_STEP_SUMMARY"
        working-directory: krabipqc_cortex_m3
